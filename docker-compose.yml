services:
  db:
    image: postgres:15
    container_name: g3-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-g3}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin}
      - POSTGRES_DB=${DB_NAME:-g3}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - g3_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: g3-backend
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://g3-db:5432/${DB_NAME:-g3}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-g3}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-admin}
    networks:
      - g3_net
      - hta_public_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: g3-frontend
    restart: unless-stopped
    environment:
      - API_BASE_URL=https://g3.htasistemas.com.br
    networks:
      - g3_net
      - hta_public_net

  nginx-g3:
    image: nginx:alpine
    container_name: nginx-g3
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - g3_net
      - hta_public_net

networks:
  g3_net:
  hta_public_net:
    external: true

volumes:
  db_data:
  backend_storage:
