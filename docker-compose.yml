services:
  db:
    image: postgres:15
    container_name: g3-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-g3}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin}
      - POSTGRES_DB=${DB_NAME:-g3}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-g3} -d $${POSTGRES_DB:-g3}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - g3_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: g3-backend
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://g3-db:5432/${DB_NAME:-g3}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-g3}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - g3_net
      - hta_public_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: g3-frontend
    restart: unless-stopped
    environment:
      - API_BASE_URL=https://g3.htasistemas.com.br
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - g3_net
      - hta_public_net

  nginx-g3:
    image: nginx:alpine
    container_name: nginx-g3
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - g3_net
      - hta_public_net

  g3-tunnel:
    image: cloudflare/cloudflared:2024.2.1
    container_name: g3-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      nginx-g3:
        condition: service_healthy
    networks:
      - g3_net

networks:
  g3_net:
    name: g3_g3_net
    external: true
  hta_public_net:
    external: true

volumes:
  db_data:
  backend_storage:
